<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Login Hub</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --whatsapp:#25D366;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:Arial;
  background:var(--bg);
  color:white;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header {
  padding:16px;
  text-align:center;
  background:var(--card);
  font-weight:bold;
}

.back {
  position:fixed;
  top:10px;
  left:10px;
  background:#ef4444;
  padding:10px 14px;
  border-radius:10px;
  z-index:999;
  cursor:pointer;
}

.menu {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  padding:16px;
}

button {
  padding:16px;
  border-radius:14px;
  border:none;
  font-size:15px;
  color:white;
  cursor:pointer;
}

.unila { background:#2563eb; }
.gmail { background:#ea4335; }
.sigaa { background:#9333ea; }
.google { background:#fbbc05; color:black; }
.facebook { background:#1877f2; }
.whatsapp { background:var(--whatsapp); }

#viewer {
  flex:1;
  border:none;
  display:none;
}

.status {
  text-align:center;
  font-size:13px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>Multi Login Hub</header>

<div class="back" onclick="goBack()">⬅ Voltar</div>

<div id="home">
  <div class="menu">
    <button class="unila" onclick="openSmart('https://portal.unila.edu.br/')">UNILA</button>
    <button class="gmail" onclick="openSmart('https://mail.google.com/')">Gmail</button>
    <button class="sigaa" onclick="openSmart('https://autenticacao-sig.unila.edu.br/sso-server/login?service=https%3A%2F%2Fsig.unila.edu.br%2Fsigaa%2Flogin%2Fcas')">SIGAA</button>
    <button class="google" onclick="openSmart('https://www.google.com/')">Google</button>
    <button class="facebook" onclick="openSmart('https://www.facebook.com/unila.oficial')">Facebook UNILA</button>
    <button class="whatsapp" onclick="openWhats()">Compartilhar no WhatsApp</button>
  </div>

  <div class="status" id="status">Toque para acessar</div>
</div>

<iframe id="viewer"></iframe>

<script>
const viewer = document.getElementById("viewer");
const home = document.getElementById("home");
const status = document.getElementById("status");

/* TODOS OS SITES QUE DEVEM ABRIR FORA */
const externalSites = [
  "portal.unila.edu.br",   // 🔥 corrigido aqui
  "facebook.com",
  "google.com",
  "mail.google.com",
  "wa.me",
  "api.whatsapp.com",
  "sig.unila.edu.br",
  "autenticacao-sig.unila.edu.br"
];

function openExternal(url) {
  const win = window.open(url, "_blank");
  if (!win) window.location.href = url;
}

function openSmart(url) {
  status.innerText = "Carregando...";

  if (externalSites.some(site => url.includes(site))) {
    openExternal(url);
    return;
  }

  home.style.display = "none";
  viewer.style.display = "block";
  viewer.src = url;

  let loaded = false;

  viewer.onload = () => {
    loaded = true;
    status.innerText = "Conectado";
  };

  setTimeout(() => {
    if (!loaded) {
      openExternal(url);
    }
  }, 2000);
}

/* VOLTAR */
function goBack() {
  if (viewer.style.display === "block") {
    try {
      viewer.contentWindow.history.back();
    } catch {
      goHome();
    }
  } else {
    goHome();
  }
}

function goHome() {
  viewer.src = "";
  viewer.style.display = "none";
  home.style.display = "block";
  status.innerText = "Toque para acessar";
}

/* WHATSAPP */
function openWhats() {
  openExternal("https://wa.me/message/TVT6FVFLPV63E1");
}
</script>

</body>
</html>
